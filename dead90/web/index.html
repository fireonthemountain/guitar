<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ninety Days to the Jam</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,800;1,600&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#191221; --card:#2A2138; --card2:#211A2E; --line:#3A2E4D; --cream:#F4ECDC; --amber:#E5A13C; --rose:#D2525C; --muted:#A395BB; --body:#DDD2EE; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--cream); font-family:Karla,-apple-system,sans-serif; padding:26px 18px 60px; }
  .wrap { max-width:460px; margin:0 auto; }
  .eyebrow { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--rose); text-align:center; }
  h1 { font-family:Fraunces,Georgia,serif; font-weight:800; font-size:34px; line-height:1.05; text-align:center; margin-top:6px; }
  h1 em { color:var(--amber); font-weight:600; }
  .goal { font-size:12.5px; color:var(--muted); text-align:center; margin-top:8px; }
  .goal b { color:var(--cream); }
  .phases { display:flex; gap:8px; margin:16px 0; }
  .phase { flex:1; padding:8px 6px; border-radius:10px; text-align:center; border:1px solid var(--line); }
  .phase.on { background:var(--card); border-color:var(--amber); }
  .phase .n { font-size:12px; font-weight:700; color:var(--muted); }
  .phase.on .n { color:var(--amber); }
  .phase .r { font-size:10px; color:var(--muted); margin-top:2px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .nav button { background:transparent; border:1px solid var(--line); color:#CBBFE0; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:700; font-family:inherit; }
  .nav button:disabled { color:#4a3d63; }
  .dayttl { font-family:Fraunces,Georgia,serif; font-size:20px; font-weight:700; text-align:center; }
  .weekttl { font-size:11px; color:var(--muted); text-align:center; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
  .lessoncard { background:#221A31; border:1px solid #4a3d63; border-radius:14px; margin-bottom:12px; overflow:hidden; }
  .lessonhead { width:100%; display:flex; justify-content:space-between; align-items:center; background:transparent; border:none; color:var(--cream); padding:13px 16px; font-size:13px; font-weight:700; text-align:left; font-family:inherit; }
  .lessonhead span.t { color:var(--amber); }
  .lessonbody { padding:0 16px 16px; display:none; }
  .lessonbody.open { display:block; }
  .lessonbody p { font-size:13.5px; line-height:1.6; color:var(--body); margin-bottom:10px; }
  .tabl { font-size:11px; font-weight:700; color:var(--amber); margin:12px 0 5px; }
  pre { background:#150F1E; border:1px solid var(--line); border-radius:10px; padding:10px 12px; color:var(--cream); font-size:12.5px; line-height:1.55; overflow-x:auto; font-family:ui-monospace,Menlo,monospace; }
  .term { font-size:12.5px; line-height:1.45; margin-top:6px; }
  .term b { color:var(--amber); }
  .term span { color:var(--muted); }
  .kicker { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--rose); margin-bottom:6px; }
  .kicker2 { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); margin:0 0 8px 2px; }
  .focus { font-family:Fraunces,Georgia,serif; font-size:19px; line-height:1.3; margin-bottom:12px; }
  .step { display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
  .stepn { width:20px; height:20px; border-radius:50%; flex-shrink:0; margin-top:1px; display:grid; place-items:center; background:var(--line); color:var(--amber); font-size:11px; font-weight:800; }
  .stept { font-size:13.5px; line-height:1.5; color:var(--body); }
  .milestone { background:#2e1e26; border:1px solid var(--rose); border-radius:14px; padding:13px 16px; margin-bottom:12px; font-size:13.5px; line-height:1.5; font-weight:600; }
  .block { display:flex; gap:12px; align-items:flex-start; text-align:left; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:inherit; width:100%; font-family:inherit; margin-bottom:8px; cursor:pointer; }
  .block.on { border-color:#E5A13C55; background:#241E33; }
  .cb { width:22px; height:22px; border-radius:7px; flex-shrink:0; margin-top:2px; display:grid; place-items:center; border:2px solid #5A4B73; color:var(--bg); font-weight:800; font-size:14px; }
  .block.on .cb { background:var(--amber); border-color:var(--amber); }
  .bn { font-size:13px; font-weight:700; }
  .bn span { color:var(--amber); }
  .bd { font-size:13px; color:#CBBFE0; margin-top:3px; line-height:1.4; }
  .block.on .bd { color:#8f82a8; text-decoration:line-through; }
  .donebtn { width:100%; padding:14px 0; border-radius:12px; border:none; font-weight:800; font-size:15px; background:var(--rose); color:#FFF6E8; margin-bottom:16px; font-family:inherit; }
  .donebtn.on { background:var(--line); color:#CBBFE0; }
  textarea { width:100%; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:12px; color:var(--cream); font-family:inherit; font-size:14px; resize:vertical; min-height:70px; }
  .stats { display:flex; gap:8px; margin-top:20px; }
  .stat { flex:1; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:10px 8px; text-align:center; }
  .stat .v { font-family:Fraunces,Georgia,serif; font-size:18px; font-weight:700; color:var(--amber); }
  .stat .l { font-size:10px; color:var(--muted); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }
  .quote { text-align:center; margin-top:26px; font-size:12px; color:#5A4B73; font-style:italic; font-family:Fraunces,Georgia,serif; }
  .backup { text-align:center; margin-top:14px; }
  .backup button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:6px 12px; font-size:11px; font-family:inherit; margin:0 4px; }
  svg { display:block; margin:0 auto; width:min(66vw,250px); }
  @keyframes pulse { 50% { opacity:.45 } }
  .cur { animation:pulse 1.6s ease-in-out infinite; }
  @media (prefers-reduced-motion:reduce){ .cur{animation:none} }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">A GRATEFUL DEAD GUITAR PROGRAM</div>
  <h1>Ninety Days<br><em>to the Jam</em></h1>
  <div class="goal">The goal: <b>an open mic on night 90</b> — three songs, rhythm and lead, standing, confident.</div>
  <div id="ring" style="margin-top:14px"></div>
  <div class="phases" id="phases"></div>
  <div class="nav">
    <button id="prev">&larr; Prev</button>
    <div><div class="dayttl" id="dayttl"></div><div class="weekttl" id="weekttl"></div></div>
    <button id="next">Next &rarr;</button>
  </div>
  <div id="milestone"></div>
  <div class="lessoncard">
    <button class="lessonhead" id="lessonhead"><span id="lessonlabel"></span><span id="lessontoggle" style="color:var(--muted)">+</span></button>
    <div class="lessonbody" id="lessonbody"></div>
  </div>
  <div class="card">
    <div class="kicker">TODAY'S FOCUS</div>
    <div class="focus" id="focus"></div>
    <div id="steps"></div>
    <div id="daytabs"></div>
  </div>
  <div class="kicker2">TODAY'S 40-MINUTE SESSION</div>
  <div id="blocks"></div>
  <div id="chordchart"></div>
  <button class="donebtn" id="donebtn"></button>
  <div class="kicker2" id="notelabel"></div>
  <textarea id="notes" placeholder="What clicked? What fought back?"></textarea>
  <div class="stats" id="stats"></div>
  <div class="backup">
    <button id="exportbtn">Export progress</button>
    <button id="importbtn">Import progress</button>
  </div>
  <div class="quote">&ldquo;Once in a while you get shown the light&hellip;&rdquo;</div>
</div>
<script>
const DATA = {"WEEKS": [{"t": "Home Base: Mixolydian", "lesson": {"p": ["A scale is a family of notes that belong together. The major scale is the do-re-mi sound you already know. Mixolydian is a major scale with exactly one change: the 7th note is lowered by one fret. That single flatted 7th (the \"b7\") turns sunny into sunny-with-dust \u2014 the Grateful Dead's home sound. Jerry spent a whole career inside this scale.", "This week you learn E Mixolydian in open position: E, F#, G#, A, B, C#, D. In the tab below, each line is a string (top line = thinnest string), numbers are frets, and 0 means play the string open. Read left to right, low notes first."], "tabs": [{"l": "E Mixolydian \u2014 two octaves, open position", "t": "e|---------------------------0--\nB|----------------------2-3-----\nG|----------------1-2-4---------\nD|----------0-2-4---------------\nA|----0-2-4---------------------\nE|-0-2-4------------------------"}, {"l": "This week's chords \u2014 E, A, D (x = don't play that string)", "t": "      E   A   D\ne|----0---0---2--\nB|----0---2---3--\nG|----1---2---2--\nD|----2---2---0--\nA|----2---0---x--\nE|----0---x---x--"}], "terms": [["Mixolydian", "A major scale with the 7th note lowered one fret"], ["b7", "That lowered 7th \u2014 the note that makes it sound like the Dead"], ["Open position", "The first few frets, using open strings"]]}, "days": [{"f": "Meet E Mixolydian \u2014 first octave, open position", "h": ["Play just the first octave of the lesson tab: low E string 0-2-4, A string 0-2-4, D string 0-2.", "One finger per fret: index takes fret 2, ring takes fret 4.", "Ten slow, clean passes at 60 bpm. Clean beats fast, every time."]}, {"f": "Full two octaves, up and back down \u2014 70 bpm", "h": ["Play the whole lesson tab going up, then reverse it coming down.", "No pauses at string crossings \u2014 that's the entire game today.", "If a crossing stumbles, loop just those two strings until it doesn't."]}, {"f": "Say every note name out loud as you play", "h": ["E, F#, G#, A, B, C#, D \u2014 speak each one as you fret it.", "It feels slow. It's wiring the fretboard into your brain.", "Bonus round: name them coming back down too."]}, {"f": "Sequence in 3s: E-F#-G#, F#-G#-A, G#-A-B\u2026", "h": ["Play three notes, restart one scale note higher, repeat all the way up.", "Keep strict down-up picking throughout.", "This exact pattern shows up in half of Jerry's runs."], "tabs": [{"l": "The first four groups of the sequence", "t": "A|-----------0------0-2----0-2-4-\nE|-0-2-4---2-4----4---------------"}]}, {"f": "Play the mode over an E7 drone \u2014 hear the b7", "h": ["Search YouTube for an \"E7 drone\" or \"E Mixolydian backing track.\"", "Play the scale slowly over it and pause on the D note each pass.", "That slightly bluesy rub is the b7. That's the sound you're chasing."]}, {"f": "Move the shape: A Mixolydian and D Mixolydian", "h": ["Same fingering logic starting from the open A string: A, B, C#, D, E, F#, G.", "Then start from the open D string: D, E, F#, G, A, B, C.", "The pattern travels. That's the fretboard's biggest secret."], "tabs": [{"l": "A Mixolydian \u2014 two octaves, open position", "t": "e|--------------------------0-2-3-5-\nB|--------------------2-3-----------\nG|--------------0-2-4---------------\nD|--------0-2-4---------------------\nA|--0-2-4---------------------------"}, {"l": "D Mixolydian \u2014 one octave, open position", "t": "B|----------------1-3-\nG|--------0-2-4-------\nD|--0-2-4-------------"}]}, {"f": "Free play over an E7 vamp \u2014 scale notes only", "h": ["Backing track on. No rules except: stay inside the scale.", "Play short phrases with rests between them, not endless streams.", "Hit a sour note? Slide one fret either way \u2014 you're never far from home."]}]}, {"t": "Major Pentatonic & the Jerry Box", "lesson": {"p": ["Pentatonic means five notes. Take the major scale, remove the 4th and 7th, and what's left is the major pentatonic \u2014 nearly impossible to make sound bad, and the skeleton under most Garcia solos. The Dead live in the key of B a lot, so that's where we learn it.", "The \"box\" below sits between frets 4 and 7. Your root notes (B) are at fret 7 on both E strings and fret 4 on the G string. Learn where the roots are and the box becomes a map instead of a shape."], "tabs": [{"l": "B major pentatonic \u2014 box 1 (frets 4\u20137)", "t": "e|-4-7-\nB|-4-7-\nG|-4-6-\nD|-4-6-\nA|-4-6-\nE|-4-7-"}, {"l": "This week's chords \u2014 G, C, D", "t": "      G   C   D\ne|----3---0---2--\nB|----0---1---3--\nG|----0---0---2--\nD|----0---2---0--\nA|----2---3---x--\nE|----3---x---x--"}], "terms": [["Pentatonic", "A five-note scale \u2014 the major scale minus its 4th and 7th"], ["Box", "A scale pattern that stays in one spot on the neck"], ["Root", "The note the key is named after \u2014 your home base"]]}, "days": [{"f": "B major pentatonic, box 1 \u2014 memorize it cold", "h": ["Play the lesson box bottom string to top and back, 60 bpm.", "Find every B as you pass it: fret 7 low E, fret 4 G, fret 7 high e.", "Ten passes, then try it with your eyes closed."]}, {"f": "Connect box 1 to the next box with slides", "h": ["Here's box 2 \u2014 it overlaps box 1 and sits a couple frets higher.", "Go up through box 1, slide up the B string from 7 to 9, come back down through box 2.", "Smooth beats fast. The slide should be silent work."], "tabs": [{"l": "B major pentatonic \u2014 box 2 (frets 6\u20139)", "t": "e|-7-9-\nB|-7-9-\nG|-6-8-\nD|-6-9-\nA|-6-9-\nE|-7-9-"}]}, {"f": "Add the 4 and b7 \u2014 penta melts into Mixolydian", "h": ["Add two notes to the box: E at fret 5 on the B string, and A at fret 7 on the D string.", "Pentatonic is the safe zone; those two notes are the color.", "Alternate: one phrase plain, one phrase with color."], "tabs": [{"l": "The two color notes inside box 1", "t": "B|--5--   E, the 4th\nD|--7--   A, the b7"}]}, {"f": "Ascend one box, descend the next", "h": ["Up box 1, shift up, come down box 2 \u2014 one continuous line.", "Metronome at 70. Don't rush the position shift.", "Then run the whole trip in reverse."]}, {"f": "Target the 3rd (D#) every time the chord lands", "h": ["Loop a B chord vamp. Every time a bar starts, land on D# \u2014 fret 4, B string.", "Approach it from above one pass, from below the next.", "The 3rd is the sweetest note in any chord. Feel why."]}, {"f": "Call and response: 2-bar question, 2-bar answer", "h": ["Play a short phrase that ends on any note EXCEPT B. That's the question.", "Answer it with a phrase that ends on B.", "This is the moment solos become conversations."]}, {"f": "Free play over a B vamp \u2014 pentatonic only", "h": ["Five minutes minimum, backing track on.", "The limit is the freedom: five notes force real phrasing.", "Reuse your best question-and-answer pair from yesterday."]}]}, {"t": "CAGED Triads Up the Neck", "lesson": {"p": ["A triad is the smallest possible chord: three notes \u2014 the root, the 3rd, and the 5th. The CAGED idea says the five open chord shapes you already know (C, A, G, E, D) repeat up the neck, which means every chord lives in five different places. Jerry's rhythm playing \u2014 and a lot of his lead playing \u2014 leans on these small triads instead of big barre chords.", "Start with A major on just the top three strings. Below are the same three notes (A, C#, E) in three different neighborhoods. Strum only the three thinnest strings."], "tabs": [{"l": "A major triads \u2014 top three strings, three positions", "t": "e|--5----9----12--\nB|--5----10---14--\nG|--6----9----14--"}, {"l": "This week's chords \u2014 Em and Am join G, C, D", "t": "      Em  Am\ne|----0---0--\nB|----0---1--\nG|----0---2--\nD|----2---2--\nA|----2---0--\nE|----0---x--"}], "terms": [["Triad", "A three-note chord: root, 3rd, 5th"], ["CAGED", "The five chord shapes that tile the whole neck"], ["Voicing", "One particular arrangement of a chord's notes"]]}, "days": [{"f": "A major in three places \u2014 learn the lesson triads", "h": ["Play each of the three tab shapes slowly, top three strings only.", "Say \"A major\" out loud each time \u2014 same chord, new address.", "One relaxed downstroke per shape. Let it ring."]}, {"f": "The middle shape is movable \u2014 find D, G, and A", "h": ["Take the middle lesson shape and slide it: the fret you land on sets the key.", "Find D major, G major, and A major with it.", "Movable shapes are the whole neck unlocking at once."]}, {"f": "Connect two shapes on one chord", "h": ["Pick one chord and play it in the lowest lesson shape, then the next one up.", "Walk between them slowly until the jump feels like one motion.", "Slow is fine. Smooth is the goal."]}, {"f": "Play the Ripple progression with tiny triads", "h": ["Look up the chords to Ripple (it lives around G, C, A, and D).", "Comp the whole verse using only top-three-string triads. No barre chords today.", "Hear how much lighter it sounds? That's the Dead's rhythm texture."]}, {"f": "Arpeggiate every triad \u2014 one note at a time", "h": ["Same shapes, but pick each string separately and let the notes ring together.", "Strict down-up picking.", "This is rhythm playing and lead playing shaking hands."]}, {"f": "Triads through G\u2013C\u2013D with minimal movement", "h": ["Use these three triads \u2014 they live within a few frets of each other.", "Change chords by moving one or two fingers, never jumping.", "Loop the progression until the changes happen by themselves."], "tabs": [{"l": "G, C, and D triads \u2014 top three strings, close together", "t": "      G   C   D\ne|----3---3---5---\nB|----3---5---7---\nG|----4---5---7---"}]}, {"f": "Song run: Uncle John's Band, triads only", "h": ["Look up the chords and comp the intro and verse with triads.", "Hum the melody over your own playing.", "Record 30 seconds on your phone and listen back."]}]}, {"t": "The Right Hand", "lesson": {"p": ["Tone and groove live in the right hand. Alternate picking means strict down-up-down-up, no exceptions, even when you cross strings. Hybrid picking means you keep holding the pick but pluck extra strings with your middle and ring fingers \u2014 Jerry's country-flavored snap comes straight from this.", "The banjo roll is a repeating three-string pattern borrowed from bluegrass (Garcia was a banjo player first). Hold an open G chord and loop the pattern below: the pick strikes the D string, your middle finger plucks the B, your ring finger plucks the high e. Let every note ring into the next."], "tabs": [{"l": "Banjo roll on open G \u2014 pick, middle, ring, repeat", "t": "e|------0------0------0---\nB|----0------0------0-----\nD|--0------0------0-------"}, {"l": "This week's strum pattern \u2014 over the G\u2013C\u2013D loop", "t": "count:  1    2  &    &  4  &\nstrum:  D    D  U    U  D  U\n(keep the arm swinging on the silent beats)"}], "terms": [["Alternate picking", "Strict down-up-down-up pick strokes"], ["Hybrid picking", "Pick plus bare fingers plucking at the same time"], ["Roll", "A repeating fingerpicking pattern that rings like a banjo"]]}, "days": [{"f": "Alternate picking: the 1-2-3-4 drill, 80 bpm", "h": ["Frets 1-2-3-4 on every string, one finger per fret, down-up-down-up.", "Keep the pick motion small \u2014 wrist, not elbow.", "Four clean passes across all six strings."]}, {"f": "String crossing in 4s, strict alternation", "h": ["Play your E Mixolydian scale, never breaking the down-up order.", "The hard part is an up-stroke landing on a fatter string. That's normal.", "Slow down until the crossings are silent."]}, {"f": "Hybrid picking: pick plus middle finger", "h": ["Pick the open A string, then instantly pluck fret 2 on the B string with your bare middle finger.", "Loop it as steady eighth notes \u2014 pick, pluck, pick, pluck.", "That fingertip snap is the country half of Jerry."], "tabs": [{"l": "Hybrid picking loop \u2014 pick the A, finger the B string", "t": "B|-----2-----2-----2---   (middle finger)\nA|--0-----0-----0------   (pick)"}]}, {"f": "The banjo roll on open G", "h": ["Run the lesson tab: pick hits D, middle plucks B, ring plucks high e.", "Let all three strings ring into each other.", "Start at 60 bpm. Evenness matters more than speed."]}, {"f": "Accent shifting: lean on 2 and 4", "h": ["Run yesterday's roll, but play beats 2 and 4 louder than 1 and 3.", "Then move the accent to the \"and\" of each beat.", "Control over volume is where groove comes from."]}, {"f": "Everything from this week, +10 bpm", "h": ["Revisit days 1\u20135 one metronome notch faster.", "If a drill falls apart, drop back 5 bpm \u2014 find your true edge.", "Log today's tempos in the notes so future-you can gloat."]}, {"f": "Apply it: Cumberland Blues rhythm workout", "h": ["Look up the tune and comp along, all attention on right-hand bounce.", "Sneak the banjo roll into the G sections.", "Fun is the actual assignment today."]}]}, {"t": "Bends, Vibrato & Slides", "lesson": {"p": ["A bend pushes the string sideways to raise its pitch \u2014 it's the guitar imitating the human voice. A whole-step bend must land exactly on the pitch two frets higher; your ear is the referee, not your hands. Vibrato is a small, steady wobble that keeps a held note alive instead of letting it die.", "Check your bend intonation like this: play fret 9 on the G string and memorize that pitch. Then bend fret 7 until the two match. Always bend with three fingers \u2014 the ring finger frets the note while middle and index push behind it for strength."], "tabs": [{"l": "The pitch-check bend \u2014 target first, then bend to match", "t": "G|--9----7b9----7b9--"}, {"l": "This week's chords \u2014 E7, A7, B7, plus the 12-bar loop", "t": "      E7  A7  B7\ne|----0---0---2--\nB|----3---2---0--\nG|----1---0---2--\nD|----0---2---1--\nA|----2---0---2--\nE|----0---x---x--\n\n| E7 | E7 | E7 | E7 |\n| A7 | A7 | E7 | E7 |\n| B7 | A7 | E7 | E7 |"}], "terms": [["Whole step", "A two-fret distance in pitch"], ["Oblique bend", "Bending one string while another rings unbent"], ["Vibrato", "A controlled, repeating wobble on a held note"]]}, "days": [{"f": "Whole-step bends, pitch-checked", "h": ["Run the lesson drill: hear fret 9, then bend fret 7 up to match it.", "Three fingers behind every bend \u2014 ring bends, middle and index help push.", "Ten bends. Be brutally honest about the pitch."]}, {"f": "Half-step bend and release, slow motion", "h": ["Bend fret 7 up just one fret's worth \u2014 check it against fret 8.", "Then lower it back down as slowly and evenly as you raised it.", "The release should be silent: no scrapes, no wobble."]}, {"f": "Vibrato: slow and wide, then narrow", "h": ["Hold fret 7 on the B string and rock your wrist to wobble the pitch.", "Exaggerate first \u2014 big slow waves \u2014 then gradually tighten.", "Sync it to the metronome: one full wave per beat."]}, {"f": "Slide into chord tones from below", "h": ["Pick one fret below your target note and slide in without re-picking.", "Target the 3rds and 5ths of a B chord.", "Slides are cheap expression. Spend freely."]}, {"f": "Bend and hold while picking a second string", "h": ["Bend the G string at fret 7 up a whole step, hold it there, and pick fret 5 on the B string.", "This oblique move is pure pedal steel \u2014 pure Jerry.", "It hurts today. It's gorgeous in a month."], "tabs": [{"l": "The oblique bend \u2014 bend, hold, add the top note", "t": "B|---------5-----   (rings straight)\nG|--7b9~~~~~~~~~~   (bent and held)"}]}, {"f": "Oblique bends in two more positions", "h": ["Move yesterday's bend-and-hold to two other spots on the neck.", "Pitch-check the bent note every single time.", "Slow tempo, maximum listening."]}, {"f": "Sing a phrase, play it with bends only", "h": ["Hum any four-note melody \u2014 anything.", "Find it on the G and B strings using bends and slides instead of separate frets.", "This is the day technique starts becoming a voice."]}]}, {"t": "Chromatic Color", "lesson": {"p": ["Chromatic notes are the in-between notes \u2014 anything one fret outside your scale. Played carelessly they sound wrong; played on purpose they create motion and pull. The one rule: chromatic notes pass through, they never park. Always land on a chord tone.", "The approach note is the easiest version: play the note one fret below your target, then resolve up onto it. The enclosure surrounds the target \u2014 one note above, one below, then land. Below, an enclosure that circles and lands on B."], "tabs": [{"l": "Enclosure landing on B \u2014 above, below, target", "t": "G|--5--3--4--"}], "terms": [["Chromatic", "A note one fret outside the scale"], ["Approach note", "The note one fret below a target, resolving up"], ["Enclosure", "Circling a target: above, below, then land"]]}, "days": [{"f": "Approach every chord tone from one fret below", "h": ["Loop a B chord. Before each chord tone (B, D#, F#), play the fret below it first.", "Approach note on the weak beat, target note on the strong beat.", "Instant jazz-country flavor. Notice how the target now shines."]}, {"f": "Enclosures: above, below, land", "h": ["Run the lesson tab: C, then A#, landing on B.", "Build the same move around D# and around F#.", "An enclosure is a spotlight pointed at the target note."]}, {"f": "Chromatic walks between pentatonic boxes", "h": ["Travel from box 1 to box 2 on one string, hitting every fret in between.", "Time the walk so you arrive on a scale note exactly on beat one.", "Passing through \u2014 never parking."]}, {"f": "The ascending chromatic run into the root", "h": ["Walk up into B: frets 2, 3, 4 on the G string (A, A#, B).", "End the run exactly on beat one.", "A classic Garcia sentence-ender. File it away."], "tabs": [{"l": "The chromatic walk-up \u2014 land B on beat one", "t": "G|--2--3--4--\n     A  A#  B"}]}, {"f": "Passing tones inside the scale", "h": ["Play Mixolydian phrases, but fill one whole-step gap per phrase with its in-between fret.", "Keep passing tones quick and light \u2014 grace notes, not destinations.", "The scale is the road; these are the gravel shoulders."]}, {"f": "One chromatic idea per phrase \u2014 no more", "h": ["Solo over a B vamp. Each phrase gets exactly one approach, enclosure, or walk.", "Restraint is what makes them shine.", "Overuse turns color into seasickness."]}, {"f": "Free play \u2014 count your chromatic moves", "h": ["Five-minute jam. Tally every chromatic device you use.", "Aim for 8\u201312 total: present, not constant.", "Note which one is starting to feel like yours."]}]}, {"t": "Arpeggio Targeting", "lesson": {"p": ["An arpeggio is a chord played one note at a time. When you solo, arpeggios are the safety rails: chord tones are the notes that always sound right over that chord, no matter what. \"Targeting\" means aiming your phrase so a chord tone lands right when the chord changes \u2014 the difference between playing over the changes and playing through them.", "Below is a B major arpeggio (B, D#, F#) in one compact position. Learn it, then hunt the same three notes elsewhere on the neck."], "tabs": [{"l": "B major arpeggio \u2014 B, D#, F#, B", "t": "G|------------4--\nD|-----1--4------\nA|--2------------"}], "terms": [["Arpeggio", "A chord played one note at a time"], ["Chord tone", "A note that belongs to the current chord"], ["Targeting", "Landing a chord tone exactly when the chord changes"]]}, "days": [{"f": "B major arpeggio \u2014 lesson position plus two more", "h": ["Play the lesson tab until it's smooth, saying the note names: B, D#, F#, B.", "Then find those same three notes in two other spots.", "Arpeggios are just chords walking single file."]}, {"f": "E and F#m arpeggios \u2014 the Scarlet neighborhood", "h": ["E major is E, G#, B. F# minor is F#, A, C#.", "Both sit right next to the B shape you already know \u2014 minimal travel.", "Loop B \u2192 E \u2192 F#m arpeggios in steady time."], "tabs": [{"l": "E major arpeggio \u2014 E, G#, B, E", "t": "D|-----------2--\nA|--------2-----\nE|--0--4--------"}, {"l": "F# minor arpeggio \u2014 F#, A, C#, F#", "t": "D|-----------4--\nA|-----0--4-----\nE|--2-----------"}]}, {"f": "Land the 3rd on beat one", "h": ["Loop a B-to-E change, two bars each.", "When E arrives, be on G#. When B returns, be on D#.", "This single skill makes a solo sound professional overnight."]}, {"f": "Half arpeggio, half scale", "h": ["Over the B\u2013E loop: outline the chord for two beats, run the scale for two.", "The arpeggio anchors; the scale decorates.", "Swap the order every pass."]}, {"f": "Dominant 7 arpeggios: A7 and D7", "h": ["A7 is A, C#, E, G. D7 is D, F#, A, C.", "The b7 baked into the arpeggio is Mixolydian flavor, pre-installed.", "Learn each tab, then find the same notes one more place on the neck."], "tabs": [{"l": "A7 arpeggio \u2014 A, C#, E, G", "t": "D|--------2--5--\nA|--0--4--------"}, {"l": "D7 arpeggio \u2014 D, F#, A, C", "t": "G|--------2--5--\nD|--0--4--------"}]}, {"f": "Spell the chords out loud, then solo", "h": ["Before each backing-track chorus, say the chord tones of every chord in the loop.", "Then solo, hunting exactly those notes.", "Knowledge becomes fingers a little more every day."]}, {"f": "Solo the full Scarlet Begonias verse form", "h": ["Look up the verse changes and loop them.", "One chorus arpeggios-only, then one chorus free.", "Record the free one and listen for the targeted 3rds."]}]}, {"t": "The Jerry Lexicon", "lesson": {"p": ["A lick is a short, reusable phrase \u2014 vocabulary. You learn licks the way you learn words: copy exactly, then use them in your own sentences until they stop feeling borrowed. Three licks this week, all in B. The daily work moves them into other keys, which is how they become permanently yours."], "tabs": [{"l": "Lick 1 \u2014 the pentatonic roll-off (descending)", "t": "B|--7--4----------\nG|--------6--4----\nD|------------6--4"}, {"l": "Lick 2 \u2014 Mixolydian run down to the b7", "t": "G|--8--6--4----\nD|----------7--"}, {"l": "Lick 3 \u2014 chromatic enclosure phrase", "t": "G|--5--3--4----\nD|----------6--"}], "terms": [["Lick", "A short, reusable musical phrase"], ["Transpose", "Moving a phrase to a different key"], ["Phrase", "A musical sentence with a start and an end"]]}, "days": [{"f": "Lick 1: the penta roll-off, in B", "h": ["Learn the first lesson tab exactly \u2014 the rhythm counts as much as the notes.", "Loop it twenty times until your hand owns it.", "Then play it once at the end of a phrase of your own."]}, {"f": "Lick 1 in E and A", "h": ["Slide the whole shape so it starts from each new root.", "Same fingering, new neighborhood.", "Transposing is the exact moment a lick becomes vocabulary."]}, {"f": "Lick 2: the Mixolydian run to the b7", "h": ["Second lesson tab: D#, C#, B, resolving down to A.", "Land the A gently \u2014 it's the color note, not a crash pad.", "Loop it, then alternate it with Lick 1."]}, {"f": "Lick 2 in three keys, rhythm remixed", "h": ["Play it in B, E, and A.", "Then stretch it: same notes at half speed, then syncopated.", "Rhythmic variation doubles your vocabulary for free."]}, {"f": "Lick 3: the chromatic enclosure phrase", "h": ["Third lesson tab: circle the B, land it, drop to the G# below.", "Attach a short scale run in front so it ends a longer sentence.", "Your most jazz-Jerry lick so far."]}, {"f": "Chain all three into one statement", "h": ["Lick 1, breath, Lick 2, breath, Lick 3.", "Adjust the joins until it flows like a single thought.", "Congratulations \u2014 you just composed a solo chorus."]}, {"f": "Improvise; quote each lick once", "h": ["Five minutes over a B vamp.", "Work each lick in naturally \u2014 no announcing it.", "If one shows up uninvited, it's officially yours now."]}]}, {"t": "Double Stops", "lesson": {"p": ["A double stop is two notes played at once \u2014 instant harmony, and one of the most Garcia sounds there is. 3rds (notes two scale steps apart) sound sweet and vocal, like two singers. 6ths (a wider gap, usually with a skipped string in between) sound like a pedal steel crying in the next room.", "Below: 3rds walking up in A on the G and B strings. Press both notes cleanly and strum only those two strings. Slide between pairs instead of lifting off."], "tabs": [{"l": "3rds in A \u2014 paired notes on the G and B strings", "t": "B|--2--3--5--7--\nG|--2--4--6--7--"}], "terms": [["Double stop", "Two notes played at the same time"], ["3rds", "Note pairs two scale steps apart \u2014 sweet and vocal"], ["6ths", "Wider pairs with a skipped string \u2014 the pedal-steel sound"]]}, "days": [{"f": "3rds up the scale, two strings at once", "h": ["Run the lesson tab: paired notes, G and B strings.", "Press both cleanly; strum only those two strings.", "Walk the pairs up and back until the moves are automatic."]}, {"f": "6ths on strings 1 and 3 \u2014 the sweet stuff", "h": ["Skip the B string: fret the G and high e strings together.", "Walk these pairs up the neck, letting a lazy finger mute the B string.", "Instant Peggy-O tenderness."], "tabs": [{"l": "6ths in A \u2014 G and high e strings, B string muted", "t": "e|--5---7---9---10--\nB|--x---x---x---x---\nG|--6---7---9---11--"}]}, {"f": "Double-stop bends", "h": ["Bend the G-string note while its B-string partner rings straight.", "Small bends \u2014 a half step is plenty.", "The clash-then-resolve is the entire point."]}, {"f": "Hybrid-picked double-stop riffing", "h": ["Pick the low note, pluck the high one with your middle finger.", "Groove on an A7 vamp \u2014 think chicken-pickin' Jerry.", "Add tiny slides between the pairs."]}, {"f": "Harmonize a melody in 3rds", "h": ["Take any simple melody \u2014 Happy Birthday absolutely counts.", "Play it in double-stop 3rds, slowly.", "This is ear training wearing a guitar costume."]}, {"f": "Double stops as rhythm fills", "h": ["Comp a B\u2013E vamp. Between chord hits, sneak in short two-note fills.", "Fills answer the chord, then get out of the way.", "This blend is most of what Jerry does under vocals."]}, {"f": "Solo with a double stop in every phrase", "h": ["Five minutes over the vamp.", "Every phrase must contain at least one pair.", "Single notes are words; double stops are harmony singing along."]}]}, {"t": "Two-Chord Vamps", "lesson": {"p": ["A vamp is a short progression that repeats forever \u2014 the Dead's launchpad. Fire on the Mountain is two chords, B to A, around and around for as long as the band feels like it. With no form to track, all of your attention goes where it matters: phrasing, dynamics, and space.", "Make your own backing track this week: record two or three minutes of yourself comping the vamp on your phone, then solo over the recording. The week's one discipline: once the loop starts, you never stop playing."], "tabs": [{"l": "The Fire vamp \u2014 one bar each, forever", "t": "|  B  . . .  |  A  . . .  |  (repeat)"}], "terms": [["Vamp", "A short chord loop that repeats indefinitely"], ["Comping", "Playing rhythm chords behind a melody or solo"], ["Dynamics", "Deliberate changes in volume and intensity"]]}, "days": [{"f": "Fire on the Mountain: comp the vamp for 5 minutes", "h": ["Two chords: B to A, one bar each, forever.", "Record 2\u20133 minutes of your comping \u2014 that's your backing track for the week.", "Vary the strumming, but keep the groove sacred."]}, {"f": "Solo 5 minutes, zero stopping", "h": ["Over yesterday's recording. No pauses allowed, even after mistakes.", "Mistakes get absorbed into the next phrase, never restarted.", "Endurance is a skill. Today it starts."]}, {"f": "One motif per minute", "h": ["Set a timer. Each minute, pick one small idea and milk it dry.", "Repeat it, move it up, flip it \u2014 do not abandon it.", "Development beats novelty every time."]}, {"f": "Whisper chorus, shout chorus", "h": ["Alternate: once through as quietly as you can, then as big as you can.", "Volume comes from pick attack, not the amp knob.", "Dynamics are the cheapest drama available."]}, {"f": "Two beats of silence per phrase", "h": ["End each phrase, then count two full beats before the next one.", "Uncomfortable means you're doing it right.", "Jerry's space is as famous as his notes."]}, {"f": "Franklin's Tower: same drills, new vamp", "h": ["Loop the Franklin's changes below \u2014 record your own backing track again.", "Run the motif drill and the dynamics drill over it.", "Notice how a third chord changes your note choices."], "tabs": [{"l": "The Franklin's vamp \u2014 A Mixolydian territory", "t": "|  A  . . .  |  A  . . .  |  G  . . .  |  D  . . .  |  (repeat)"}]}, {"f": "Record, listen, fix exactly one thing", "h": ["Record a full 5-minute jam.", "Listen once through with the guitar out of your hands.", "Write ONE fix in the notes below. Just one."]}]}, {"t": "Melodic Development", "lesson": {"p": ["A motif is a tiny idea \u2014 three to five notes. Great solos aren't a parade of unrelated licks; they take one idea and grow it: repeat it, move it higher, flip it upside down, stretch its rhythm. Listeners follow a solo the way they follow a sentence \u2014 through repetition and variation.", "Jerry's other secret is simpler: he starts from the vocal melody and decorates it. When you're lost mid-solo, play the melody. It always works, and nobody plays it enough."], "tabs": [{"l": "Motif development \u2014 one idea, three treatments", "t": "state it   \u2192  repeat it  \u2192  move it up  \u2192  flip it"}], "terms": [["Motif", "A tiny musical idea, 3\u20135 notes"], ["Development", "Growing one idea through variation"], ["Displacement", "The same phrase started on a different beat"]]}, "days": [{"f": "Motif lab: repeat, transpose, invert", "h": ["Pick three notes. Play them. Again. Now start them higher. Now flip the direction.", "Ten minutes on ONE motif \u2014 resist every new idea that shows up.", "This discipline is what audiences hear as storytelling."]}, {"f": "Rhythmic displacement", "h": ["Same motif, but start it on beat 2 instead of beat 1.", "Then start it on the \"and\" of 1.", "Familiar notes in a new place: fresh without being random."]}, {"f": "Question and answer, formalized", "h": ["A two-bar phrase ending unresolved, then a two-bar phrase ending on the root.", "Ten pairs in a row over the vamp.", "Keep the question identical; vary only the answers."]}, {"f": "Engineer a peak at bar 24", "h": ["Solo over 32 bars. Plan to hit maximum height \u2014 register, volume, density \u2014 at bar 24.", "Then descend and land soft.", "Peaks feel accidental to the listener. They never are."]}, {"f": "The melody-first approach", "h": ["Pick a Dead tune you can sing and find its vocal melody on the neck.", "Solo by decorating that melody: slides, doubles, approach notes.", "This is the actual center of Garcia's style."]}, {"f": "Resolve vs. suspend", "h": ["Alternate phrase endings: land on the root (resolved), then on the 2nd or 6th (floating).", "Feel how the suspended endings pull the listener forward.", "Control of tension is control of the room."]}, {"f": "The three-chorus story", "h": ["Chorus 1: sparse and low. Chorus 2: motifs develop. Chorus 3: peak, then release.", "Record it.", "Listen back \u2014 can you hear the arc from the outside?"]}]}, {"t": "Full Song Forms", "lesson": {"p": ["A form is the map of a song \u2014 which sections, in what order, how many bars each. Soloing over a form means always knowing where you are on that map. This week: three Dead standards. For each one, learn the chords first, comp the full form until it's automatic, and only then solo.", "The rule for the week: if you get lost, do not stop. Drop back to comping until beat one finds you, then re-enter. Recovering gracefully IS the skill \u2014 it's what separates playing songs from playing exercises."], "tabs": [{"l": "The weekly ladder", "t": "learn form \u2192 comp it cold \u2192 solo it \u2192 recover gracefully"}], "terms": [["Form", "The section map of a song"], ["Changes", "The chord progression of a form"], ["Chorus", "One full trip through the form"]]}, "days": [{"f": "Deal: learn and comp the form", "h": ["Look up the changes and map the sections in your notes below.", "Comp the full form five times at an easy tempo.", "Count out loud through anything that trips you."]}, {"f": "Deal: solo the full form", "h": ["Solo while naming each chord as it arrives \u2014 out loud or in your head.", "Target 3rds at every change. Week 7 pays off right here.", "Lost? Comp until beat one comes around, then re-enter."]}, {"f": "Sugaree: form plus fills", "h": ["Learn the form. It breathes slower \u2014 leave real space.", "Add short double-stop fills where the vocal lines would pause.", "Fills serve the song, not the soloist."]}, {"f": "Sugaree: the three-chorus build", "h": ["Apply the Week 11 arc across three full choruses.", "Chorus 3 should visit your highest register of the day.", "Record the last chorus."]}, {"f": "Bertha: the form at tempo", "h": ["A faster tune \u2014 comp until the changes run on autopilot.", "Simplify: triads and muted strums keep the train on the rails.", "Tempo exposes hesitation. That's exactly the point."]}, {"f": "Bertha: solo and recover", "h": ["Solo the form. When you flub \u2014 you will \u2014 keep the right hand moving.", "Absorb the mistake into a rhythm figure, then re-enter the solo.", "Graceful recovery is a stage skill you can build alone in a room."]}, {"f": "The mini-set", "h": ["Deal, then Sugaree, then Bertha. Back to back, no restarts.", "Comp each head, solo one full form per tune.", "You just played a set. Note how the energy held up."]}]}, {"t": "The Long Jam", "lesson": {"p": ["Everything converges here. A long jam is a conversation with yourself: statements, questions, space, and a peak you build on purpose. Think in waves \u2014 rise, crest, breathe, rise higher. Ten minutes is a long time on purpose; boredom is the doorway, and what's on the other side of it is the actual jam.", "Record everything this week. Listening back is where half the learning lives: you'll hear the rushing, the repetition, and \u2014 more often than you expect \u2014 the moments that genuinely worked."], "tabs": [{"l": "The wave shape", "t": "rise \u2192 crest \u2192 breathe \u2192 rise higher \u2192 crest \u2192 release"}], "terms": [["Peak", "The planned high point of a jam"], ["Trading fours", "Alternating four-bar phrases with another player"], ["Space", "Deliberate silence, played on purpose"]]}, "days": [{"f": "Ten minutes, one key, no stopping", "h": ["Timer on, backing vamp on, go.", "Use everything: motifs, licks, double stops, space, dynamics.", "Boredom is the doorway. Play through it."]}, {"f": "Jam with a modulation", "h": ["Five minutes in B, then lift the whole jam up to E for five more.", "Plan the pivot: land on G# \u2014 the 3rd of E \u2014 right at the switch.", "A modulation is the jam's second wind."]}, {"f": "Trade fours with a recording", "h": ["Put on a live Dead jam. Play four bars, then lay out four while the band answers.", "Steal something from their four for your next four.", "Listening is the deepest practice there is."]}, {"f": "Three waves of intensity", "h": ["Ten minutes, three planned peaks, each higher than the last.", "Between peaks: drop the volume, thin the notes, breathe.", "You're conducting yourself. That's what this is."]}, {"f": "Half the notes, twice the intent", "h": ["Ten minutes with a hard rule: long tones, space, and vibrato do the talking.", "Every note gets a beginning, a middle, and an end.", "Less has never been more than it is today."]}, {"f": "Record your best jam of the program", "h": ["Warm up properly, then record ten minutes in one take.", "Listen back tonight with day-one ears.", "Compare it to your Week 10 recording. Feel that distance."]}, {"f": "Day 90: the open mic set \u2014 rhythm and lead", "h": ["Ripple with the roll texture, Friend of the Devil opening with its intro run, your closer with the 8-bar solo break. Standing, announced, timed.", "You have played this set dozens of times. The stage is just a room with better light.", "Ninety days. What a long strange trip. Now go sign up for the slot."]}]}], "PHASES": [{"name": "Foundation", "range": [1, 30], "sub": "Hands, scales, chords"}, {"name": "Vocabulary", "range": [31, 60], "sub": "The Jerry lexicon"}, {"name": "The Jam", "range": [61, 90], "sub": "Improvisation & forms"}], "CHORD_DRILLS": ["Open E, A, and D \u2014 shapes are drawn just below. Run the one-minute change test: switch E\u2192A as many times as you can in 60 seconds, log the count in your notes. Then A\u2192D. Beat yesterday's number.", "Open G, C, and D \u2014 shapes below. One-minute change tests: G\u2192C, then C\u2192D. Then loop G\u2013C\u2013G\u2013D slowly, four downstrums per chord, no gaps between changes.", "Add Em and Am \u2014 shapes below. Loop G\u2013Em\u2013C\u2013D, four beats each. That's the folk engine under half the songbook. Keep the strumming plain; the changes are the workout.", "Strum pattern week: Down, Down-Up, Up-Down-Up over the G\u2013C\u2013D loop \u2014 chart below. Count it \"1, 2-and, and-4-and.\" Keep the arm moving even through the misses.", "Dominant 7ths: E7, A7, B7 \u2014 shapes below. Loop a 12-bar in E: E7\u00d74 bars, A7\u00d72, E7\u00d72, B7\u00d71, A7\u00d71, E7\u00d72. This is the blues floor under the whole Dead catalog."], "CHORD_CHARTS": [{"l": "Week 1 chords \u2014 E, A, D (x = don't play that string)", "t": "      E   A   D\ne|----0---0---2--\nB|----0---2---3--\nG|----1---2---2--\nD|----2---2---0--\nA|----2---0---x--\nE|----0---x---x--"}, {"l": "Week 2 chords \u2014 G, C, D", "t": "      G   C   D\ne|----3---0---2--\nB|----0---1---3--\nG|----0---0---2--\nD|----0---2---0--\nA|----2---3---x--\nE|----3---x---x--"}, {"l": "Week 3 chords \u2014 G, C, D, plus Em and Am", "t": "      G   C   D   Em  Am\ne|----3---0---2---0---0--\nB|----0---1---3---0---1--\nG|----0---0---2---0---2--\nD|----0---2---0---2---2--\nA|----2---3---x---2---0--\nE|----3---x---x---0---x--"}, {"l": "Week 4 \u2014 G, C, D with the strum pattern", "t": "      G   C   D\ne|----3---0---2--\nB|----0---1---3--\nG|----0---0---2--\nD|----0---2---0--\nA|----2---3---x--\nE|----3---x---x--\n\ncount:  1    2  &    &  4  &\nstrum:  D    D  U    U  D  U"}, {"l": "Week 5 chords \u2014 E7, A7, B7, plus the 12-bar loop", "t": "      E7  A7  B7\ne|----0---0---2--\nB|----3---2---0--\nG|----1---0---2--\nD|----0---2---1--\nA|----2---0---2--\nE|----0---x---x--\n\n| E7 | E7 | E7 | E7 |\n| A7 | A7 | E7 | E7 |\n| B7 | A7 | E7 | E7 |"}], "REP_DRILLS": ["Song 1: Ripple. Verse chords (G, C, A, D territory) with the Week 4 strum. Then re-run the verse swapping the banjo roll onto every G chord \u2014 rhythm one pass, texture the next. Both styles, same song.", "Ripple start to finish, singing or humming. Now add lead: end each vocal line with a small fill \u2014 slide into the 3rd of the next chord (your Week 5 skill). Strummer AND soloist, four bars at a time.", "Song 2: Friend of the Devil. That famous descending intro run IS lead guitar \u2014 learn it exactly, it opens your set. Then the verse chords (G, C, D, Am), picking the bass note before each strum.", "Friend of the Devil start to finish, then Ripple from memory. End one Ripple verse with Lick 1 transposed to G \u2014 exactly what this week teaches. Your first planned lead moment on stage.", "Your closer: Sugaree \u2014 mid-tempo, built for lead. Learn the verse, then mark TWO spots for double-stop fills (this week's skill). Keep Songs 1\u20132 warm: one memory pass each."], "PERFORMANCE_REPS": ["Stage rep: Ripple, start to finish, STANDING, no stops \u2014 roll texture on at least two verses, fills at the line endings. Mistakes get played through, never restarted.", "Stage rep: Friend of the Devil from memory, standing, intro run included. Announce it out loud first, like you're at the mic: \"This one's called\u2026\"", "Stage rep: your closer with an 8-bar solo break \u2014 two verses of comping, one short solo built from ONE motif (Week 11 style), then back to the verse. Land the ending clean and deliberate.", "Stage rep: the FULL set, 10 seconds max between songs, timed. The closer keeps its solo break \u2014 that's your jam moment on stage. An open mic slot is 10\u201315 minutes.", "Stage rep: record one set song on video and watch it back. You're checking posture, the fills, and recovery \u2014 not perfection.", "Stage rep: play one song for a real human \u2014 spouse, kid, friend on a video call. Bonus: improvise one fill you've never played before, while they watch."], "MILESTONES": {"30": "MILESTONE \u2014 Checkpoint 1: loop G\u2013C\u2013D with the strum pattern for 3 straight minutes, no stopping. That's a song's worth of endurance.", "60": "MILESTONE \u2014 Checkpoint 2: Ripple and Friend of the Devil back to back, from memory, recorded \u2014 with at least one lead fill in each. Two-thirds of your set, both styles present.", "90": "MILESTONE \u2014 THE GOAL: three songs, standing, for people \u2014 fills throughout and a solo break in the closer. Rhythm player AND lead player, same guy. Find the open mic; you've done this dozens of times."}};
const {WEEKS, PHASES, CHORD_DRILLS, CHORD_CHARTS, REP_DRILLS, PERFORMANCE_REPS, MILESTONES} = DATA;
const STRUM_PATTERNS = {l:"The five strum patterns (today's is named in the Chords block)", t:"count:         1  &  2  &  3  &  4  &\n1 Foundation   D     D     D     D\n2 Backbeat     D     D  U  D     D  U\n3 Campfire     D     D  U     U  D  U\n4 Boom-chick   B     D     B     D\n5 The Chop     D     x     D     x\n\nB = pick just the bass string of the chord\nx = muted slap: relax the fret hand, strum the thunk\n1 steady - 2 bounce - 3 the classic - 4 Dead country - 5 groove"};
const STRUM_NAMES = ["Foundation","Backbeat","Campfire","Boom-chick","The Chop"];
const KEY = "dead90";
let state = {completed:[], notes:{}, blocks:{}};
try { const s = localStorage.getItem(KEY); if (s) state = JSON.parse(s); } catch(e) {}
function save(){ try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} }

const phaseFor = d => d<=30?0:(d<=60?1:2);
function blocksFor(day){
  const p = phaseFor(day), w = Math.min(Math.floor((day-1)/7),12);
  if(p===0) return [
    {n:"Warmup",m:5,d:"Chromatic 1-2-3-4 drill: frets 1-2-3-4 on every string, one finger per fret, down-up picking, 60 bpm"},
    {n:"Technique",m:20,d:"Work today's focus — the numbered steps above"},
    {n:"Chords",m:15,d:CHORD_DRILLS[Math.min(w,4)]+" Strum of the day: #"+(((day-1)%5)+1)+" ("+STRUM_NAMES[(day-1)%5]+") - chart below."}];
  if(p===1) return [
    {n:"Warmup",m:5,d:"60 seconds of the banjo roll on G, then E Mixolydian two octaves up and down, twice"},
    {n:"Vocabulary",m:15,d:"Work today's focus — the numbered steps above"},
    {n:"Application",m:10,d:"Loop a B vamp (record 2 minutes of comping, or find a backing track) and use today's idea over it, slow tempo first"},
    {n:"Repertoire",m:10,d:REP_DRILLS[Math.min(Math.max(w-4,0),4)]}];
  return [
    {n:"Warmup",m:5,d:"One Phase 2 lick in a brand-new key, plus one slow pass of the B pentatonic box"},
    {n:"Stage rep",m:10,d:PERFORMANCE_REPS[day%PERFORMANCE_REPS.length]},
    {n:"The Jam",m:20,d:"Work today's focus — the numbered steps above"},
    {n:"Debrief",m:5,d:"Record one minute of playing, listen back, write one sentence below"}];
}
function info(day){
  const w = Math.min(Math.floor((day-1)/7),12), di = Math.min((day-1)%7,6);
  const week = WEEKS[w], dd = week.days[di];
  const weekTabs = [...week.lesson.tabs, ...week.days.flatMap(x=>x.tabs||[])];
  return {week:w+1, theme:week.t, lesson:week.lesson, weekTabs, focus:dd.f, how:dd.h,
    dayTabs:dd.tabs||[], blocks:blocksFor(day), phase:phaseFor(day),
    chordChart: phaseFor(day)===0 ? CHORD_CHARTS[Math.min(w,4)] : null,
    milestone: MILESTONES[day] || null, isWeekStart: di===0};
}
function firstIncomplete(){ for(let i=1;i<=90;i++) if(!state.completed.includes(i)) return i; return 90; }
let day = firstIncomplete();
let lessonOpen = info(day).isWeekStart;

const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const tabHTML = t => '<div class="tabl">'+esc(t.l)+'</div><pre>'+esc(t.t)+'</pre>';

function renderRing(){
  const R=118,C=150; let dots="";
  for(let i=1;i<=90;i++){
    const a=((i-1)/90)*Math.PI*2-Math.PI/2, x=C+R*Math.cos(a), y=C+R*Math.sin(a);
    const done=state.completed.includes(i), cur=i===day;
    dots+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+(cur?6:done?4.5:3)+'" fill="'+(cur?"#D2525C":done?"#E5A13C":"#3A2E4D")+'"'+(cur?' class="cur"':'')+'/>';
  }
  const pct=Math.round(state.completed.length/90*100);
  $("ring").innerHTML='<svg viewBox="0 0 300 300">'+dots+
    '<text x="150" y="138" text-anchor="middle" fill="#F4ECDC" style="font:700 44px Fraunces,serif">'+day+'</text>'+
    '<text x="150" y="162" text-anchor="middle" fill="#A395BB" style="font:600 11px Karla,sans-serif;letter-spacing:2.5px">OF 90 DAYS</text>'+
    '<text x="150" y="186" text-anchor="middle" fill="#E5A13C" style="font:700 14px Karla,sans-serif">'+pct+'% complete</text></svg>';
}
function render(){
  const nfo = info(day);
  renderRing();
  $("phases").innerHTML = PHASES.map((p,i)=>'<div class="phase'+(i===nfo.phase?" on":"")+'"><div class="n">'+p.name+'</div><div class="r">'+p.range[0]+'&ndash;'+p.range[1]+'</div></div>').join("");
  $("prev").disabled = day===1; $("next").disabled = day===90;
  $("dayttl").textContent = "Day "+day;
  $("weekttl").textContent = "Week "+nfo.week+" · "+nfo.theme;
  $("milestone").innerHTML = nfo.milestone ? '<div class="milestone">'+esc(nfo.milestone)+'</div>' : "";
  $("lessonlabel").innerHTML = '<span class="t">Lesson · Week '+nfo.week+':</span> '+esc(nfo.theme);
  $("lessontoggle").textContent = lessonOpen ? "−" : "+";
  $("lessonbody").className = "lessonbody"+(lessonOpen?" open":"");
  $("lessonbody").innerHTML = nfo.lesson.p.map(p=>"<p>"+esc(p)+"</p>").join("")
    + nfo.weekTabs.map(tabHTML).join("")
    + '<div style="margin-top:14px">'+nfo.lesson.terms.map(t=>'<div class="term"><b>'+esc(t[0])+'</b><span> — '+esc(t[1])+'</span></div>').join("")+'</div>';
  $("focus").textContent = nfo.focus;
  $("steps").innerHTML = nfo.how.map((s,i)=>'<div class="step"><div class="stepn">'+(i+1)+'</div><div class="stept">'+esc(s)+'</div></div>').join("");
  $("daytabs").innerHTML = nfo.dayTabs.map(tabHTML).join("");
  const done = state.blocks[day]||[];
  $("blocks").innerHTML = nfo.blocks.map((b,i)=>{
    const on = done.includes(i);
    return '<button class="block'+(on?" on":"")+'" data-i="'+i+'"><div class="cb">'+(on?"✓":"")+'</div><div><div class="bn">'+esc(b.n)+' <span>· '+b.m+' min</span></div><div class="bd">'+esc(b.d)+'</div></div></button>';
  }).join("");
  document.querySelectorAll(".block").forEach(el=>el.onclick=()=>{
    const i=+el.dataset.i, cur=state.blocks[day]||[];
    state.blocks[day] = cur.includes(i)?cur.filter(x=>x!==i):[...cur,i];
    save(); render();
  });
  $("chordchart").innerHTML = nfo.chordChart ? '<div style="margin:-4px 0 16px">'+tabHTML(nfo.chordChart)+tabHTML(STRUM_PATTERNS)+'</div>' : "";
  const dayDone = state.completed.includes(day);
  $("donebtn").className = "donebtn"+(dayDone?" on":"");
  $("donebtn").textContent = dayDone ? "✓ Day complete — tap to undo" : "Mark day complete";
  $("notelabel").textContent = "PRACTICE NOTES — DAY "+day;
  $("notes").value = state.notes[day]||"";
  const ph = PHASES[nfo.phase];
  const phDone = state.completed.filter(d=>d>=ph.range[0]&&d<=ph.range[1]).length;
  $("stats").innerHTML = '<div class="stat"><div class="v">'+state.completed.length+'</div><div class="l">Days done</div></div>'+
    '<div class="stat"><div class="v">'+phDone+' / 30</div><div class="l">This phase</div></div>'+
    '<div class="stat"><div class="v">40 min</div><div class="l">Session</div></div>';
}
$("prev").onclick=()=>{ if(day>1){day--; lessonOpen=info(day).isWeekStart; render(); window.scrollTo(0,0);} };
$("next").onclick=()=>{ if(day<90){day++; lessonOpen=info(day).isWeekStart; render(); window.scrollTo(0,0);} };
$("lessonhead").onclick=()=>{ lessonOpen=!lessonOpen; render(); };
$("donebtn").onclick=()=>{
  state.completed = state.completed.includes(day)?state.completed.filter(d=>d!==day):[...state.completed,day];
  save(); render();
};
$("notes").addEventListener("blur",()=>{ state.notes[day]=$("notes").value; save(); });
$("exportbtn").onclick=()=>{
  const blob = new Blob([JSON.stringify(state)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "dead90-progress.json"; a.click();
};
$("importbtn").onclick=()=>{
  const v = prompt("Paste your exported progress JSON:");
  if(!v) return;
  try { state = JSON.parse(v); save(); day = firstIncomplete(); render(); alert("Progress restored."); }
  catch(e){ alert("Couldn't parse that — make sure it's the exported JSON."); }
};
render();
</script>
</body>
</html>
